<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>敲木鱼祈福 · 抢票必中</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(160deg, #5a0000 0%, #9b1010 35%, #c0281a 65%, #7a0a0a 100%);
            background-size: 300% 300%; animation: bgMove 14s ease infinite;
            min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
            overflow:hidden; position:relative; touch-action:manipulation;
        }
        @keyframes bgMove { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        /* 背景装饰：金色散光 + 灯笼暗纹 */
        .bg-deco {
            position:fixed; inset:0; pointer-events:none; z-index:0;
            background:
                radial-gradient(ellipse at 20% 15%, rgba(255,210,50,0.15) 0%, transparent 45%),
                radial-gradient(ellipse at 80% 85%, rgba(255,180,30,0.12) 0%, transparent 45%),
                radial-gradient(ellipse at 75% 10%, rgba(255,100,50,0.10) 0%, transparent 35%);
        }
        /* 灯笼装饰 */
        .bg-deco::before,.bg-deco::after {
            content:'🏮'; position:fixed; font-size:56px; opacity:.18;
            animation: sway 4s ease-in-out infinite;
        }
        .bg-deco::before { top:8px; left:8px; animation-delay:0s; }
        .bg-deco::after  { top:8px; right:8px; animation-delay:1.5s; }
        @keyframes sway { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }

        .container { width:100%; max-width:420px; padding:16px; text-align:center; position:relative; z-index:10; }
        .title { color:#ffd700; font-size:26px; font-weight:900; margin-bottom:4px;
                 text-shadow:0 0 18px rgba(255,180,0,0.7), 0 2px 8px rgba(0,0,0,0.4);
                 animation:fadeIn .8s ease-out; }
        .subtitle { color:rgba(255,220,160,0.95); font-size:15px; margin-bottom:20px; letter-spacing:3px;
                    text-shadow:0 1px 4px rgba(0,0,0,0.3); animation:fadeIn 1s ease-out; }

        .hit-zone {
            position:relative; width:320px; height:260px; margin:0 auto 20px;
            cursor:pointer; user-select:none; animation:fadeInUp 1s ease-out;
        }

        /* 木鱼 — 居中偏左 */
        .muyu-svg {
            position:absolute; bottom:0; left:30px;
            width:220px; height:220px;
            filter: drop-shadow(0 10px 20px rgba(80,30,0,0.4));
            transition: transform .06s ease-out;
        }
        .muyu-svg.active { transform: scale(0.97); }
        .muyu-svg.hit { animation: muyuBounce .22s ease-out; }
        @keyframes muyuBounce {
            0%  { transform: scale(1); }
            35% { transform: scale(0.94) translateY(4px); }
            100%{ transform: scale(1); }
        }

        /* 木槌 — 水平，球头在左（击打端），柄在右，从右向左敲 */
        .mallet-svg {
            position:absolute; top:46%; right:-8px;
            width:185px; height:65px;
            transform: translateY(-50%) rotate(-22deg);
            transform-origin: 97% 50%;   /* 以最右端（握柄末端）为轴旋转 */
            z-index:20; pointer-events:none;
            filter: drop-shadow(0 3px 8px rgba(0,0,0,0.22));
            animation: malletIdle 2.5s ease-in-out infinite;
        }
        /* 空闲：球头略上扬 */
        @keyframes malletIdle {
            0%,100% { transform: translateY(-50%) rotate(-22deg); }
            50%     { transform: translateY(-50%) rotate(-19deg); }
        }
        .mallet-svg.hitting { animation: malletStrike .22s ease-out !important; }
        /* 敲击：以握柄为轴，球头从上向下弧形敲入木鱼 */
        @keyframes malletStrike {
            0%  { transform: translateY(-50%) rotate(-22deg); }
            40% { transform: translateY(-50%) rotate(14deg);  }
            100%{ transform: translateY(-50%) rotate(-22deg); }
        }

        /* 涟漪 */
        .ripple-ring {
            position:absolute; width:180px; height:180px; bottom:20px; left:40px;
            border-radius:50%;
            border:2px solid rgba(255,255,255,0.7);
            box-shadow: 0 0 14px rgba(255,220,100,0.5);
            transform:scale(0); animation:ringPulse .7s ease-out forwards;
            pointer-events:none;
        }
        @keyframes ringPulse { 0%{transform:scale(.5);opacity:1} 100%{transform:scale(2);opacity:0} }

        .stats {
            background:rgba(100,0,0,0.45); backdrop-filter:blur(14px);
            border:1.5px solid rgba(255,200,80,0.45); border-radius:18px;
            padding:14px 28px; margin-bottom:14px;
            box-shadow:0 6px 24px rgba(0,0,0,0.35), 0 0 18px rgba(200,0,0,0.3);
            animation:fadeInUp 1.2s ease-out;
        }
        .count { font-size:50px; font-weight:900; color:#ffd700; line-height:1.1;
                 text-shadow:0 0 20px rgba(255,180,0,0.8), 0 2px 8px rgba(0,0,0,0.4); }
        .count-label { font-size:15px; color:rgba(255,210,120,0.9); margin-top:2px; }
        .tips { color:rgba(255,210,130,0.95); font-size:13px; line-height:1.9;
                text-shadow:0 1px 3px rgba(0,0,0,0.3); animation:fadeInUp 1.4s ease-out; }

        .bless {
            position:fixed; font-size:22px; font-weight:bold; color:#ffd700;
            text-shadow:0 0 14px rgba(255,180,0,0.9), 0 2px 6px rgba(0,0,0,0.4);
            pointer-events:none; z-index:1000; white-space:nowrap;
            animation:floatUp 1.6s ease-out forwards;
        }
        @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-110px) scale(1.1)} }

        .particles { position:fixed; inset:0; pointer-events:none; z-index:1; }
        .particle { position:absolute; border-radius:50%; animation:pfly 1.8s ease-out forwards; }
        @keyframes pfly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)} }

        @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

        .hint {
            position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
            color:rgba(255,210,120,0.85); font-size:12px; white-space:nowrap;
            text-shadow:0 1px 3px rgba(0,0,0,0.3); animation:pulse 2.5s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

        /* ========== 爆竹 & 烟花特效 ========== */

        /* 爆炸闪光（局部，非全屏） */
        .crack-flash {
            position:fixed; inset:0; z-index:500; pointer-events:none;
            background: radial-gradient(ellipse at var(--fx) var(--fy),
                rgba(255,240,120,0.88) 0%, rgba(255,80,0,0.35) 22%, transparent 55%);
            animation: flashFade .4s ease-out forwards;
        }
        @keyframes flashFade { 0%{opacity:1} 100%{opacity:0} }

        /* 爆竹碎屑纸条 */
        .cracker-bit {
            position:fixed; border-radius:2px; pointer-events:none; z-index:600;
            animation: crackerFly var(--dur) ease-out var(--delay) forwards;
            opacity:0;
        }
        @keyframes crackerFly {
            0%  { opacity:1; transform:translate(0,0) rotate(0deg) scaleY(1); }
            75% { opacity:1; }
            100%{ opacity:0; transform:translate(var(--dx),var(--dy)) rotate(var(--rot)) scaleY(.25); }
        }

        /* ---- 烟花 ---- */
        /* 火箭上升 */
        .fw-rocket {
            position:fixed; width:4px; height:14px; border-radius:2px;
            pointer-events:none; z-index:610;
            box-shadow: 0 0 8px 3px var(--color);
            background: linear-gradient(to bottom, #fff, var(--color));
            animation: rocketRise var(--flight) cubic-bezier(.3,.8,.4,1) forwards;
        }
        @keyframes rocketRise {
            0%  { opacity:1; transform:translateY(0); }
            90% { opacity:1; }
            100%{ opacity:0; transform:translateY(var(--ty)); }
        }
        /* 烟花爆炸粒子 */
        .fw-shell {
            position:fixed; width:5px; height:5px; border-radius:50%;
            pointer-events:none; z-index:620;
            animation: shellFly var(--dur) ease-out var(--delay) forwards;
            opacity:0;
        }
        @keyframes shellFly {
            0%  { opacity:1; transform:translate(0,0) scale(1); }
            70% { opacity:1; }
            100%{ opacity:0; transform:translate(var(--dx),var(--dy)) scale(.4); }
        }
        /* 烟花爆炸中心闪 */
        .fw-burst-flash {
            position:fixed; border-radius:50%; pointer-events:none; z-index:615;
            animation: burstFlash .35s ease-out forwards;
        }
        @keyframes burstFlash { 0%{opacity:.9;transform:scale(.1)} 100%{opacity:0;transform:scale(1)} }

        /* ---- 心形雨 ---- */
        .heart-drop {
            position:fixed; pointer-events:none; z-index:800; font-size:var(--sz);
            left:var(--lx); top:-50px;
            animation: heartFall var(--dur) var(--delay) ease-in forwards;
            opacity:0;
        }
        @keyframes heartFall {
            0%  { opacity:0; transform:translateY(0) rotate(0deg); }
            10% { opacity:1; }
            88% { opacity:.9; }
            100%{ opacity:0; transform:translateY(calc(100vh + 80px)) rotate(var(--rot)); }
        }

        /* ---- 幸运助力 · 顶部卡片（非全屏遮罩） ---- */
        .love-toast {
            position:fixed; top:0; left:50%; z-index:900; pointer-events:none;
            transform: translateX(-50%) translateY(-120px);
            background: linear-gradient(135deg, #7a0010 0%, #c0182a 50%, #7a0010 100%);
            border: 2px solid #ffd700;
            border-radius: 0 0 24px 24px;
            padding: 14px 28px 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 25px rgba(255,60,0,0.5),
                        inset 0 1px 0 rgba(255,220,100,0.3);
            animation: toastDown .45s cubic-bezier(.2,1.5,.5,1) forwards,
                       toastUp   .4s  3.0s ease-in forwards;
            text-align:center;
        }
        @keyframes toastDown {
            from{ transform:translateX(-50%) translateY(-120px); opacity:0; }
            to  { transform:translateX(-50%) translateY(0);       opacity:1; }
        }
        @keyframes toastUp {
            from{ transform:translateX(-50%) translateY(0);       opacity:1; }
            to  { transform:translateX(-50%) translateY(-120px);  opacity:0; }
        }
        .love-toast-big {
            font-size:26px; font-weight:900; letter-spacing:5px; color:#ffd700;
            text-shadow: 0 0 16px rgba(255,200,0,.9), 0 2px 8px rgba(0,0,0,.5);
            animation: loveGlow .5s ease-in-out infinite alternate;
            white-space:nowrap;
        }
        @keyframes loveGlow {
            from{ text-shadow:0 0 10px rgba(255,180,0,.8),0 0 25px rgba(255,100,0,.4); }
            to  { text-shadow:0 0 22px rgba(255,220,0,1),0 0 50px rgba(255,140,0,.7),0 0 80px rgba(255,60,0,.3); }
        }
        .love-toast-sub {
            font-size:13px; color:rgba(255,220,150,.9); margin-top:5px; letter-spacing:2px;
        }

        /* 礼花纸屑 */
        .confetti {
            position:fixed; pointer-events:none; z-index:700;
            width:var(--w); height:var(--h); border-radius:var(--br);
            background:var(--color); left:var(--lx); top:var(--ty);
            animation: confettiFly var(--dur) var(--delay) ease-out forwards;
            opacity:0;
        }
        @keyframes confettiFly {
            0%  { opacity:1; transform:translate(0,0) rotate(0deg); }
            100%{ opacity:0; transform:translate(var(--dx),var(--dy)) rotate(var(--rot)); }
        }

        /* 调试按钮 */
        .debug-btn {
            position:fixed; bottom:52px; right:12px; z-index:200;
            background:rgba(80,0,0,0.7); border:1px solid rgba(255,200,80,0.5);
            color:rgba(255,200,100,.8); font-size:11px; border-radius:12px;
            padding:5px 10px; cursor:pointer; backdrop-filter:blur(6px);
            transition: opacity .2s;
        }
        .debug-btn:active { opacity:.6; }
    </style>
</head>
<body>
    <div class="bg-deco"></div>
    <div class="particles" id="particles"></div>
    <div class="container">
        <h1 class="title">🙏 敲木鱼祈福 🙏</h1>
        <p class="subtitle">齐齐哈尔 → 北京 🚄</p>

        <div class="hit-zone" id="hitZone">

            <!-- 木槌：水平，球头在左（击打端），握柄向右延伸出画面，从右向左敲 -->
            <svg class="mallet-svg" id="mallet" viewBox="0 0 185 65">
                <defs>
                    <!-- 握柄木纹渐变（横向） -->
                    <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%"   stop-color="#d4a055"/>
                        <stop offset="45%"  stop-color="#e8c07a"/>
                        <stop offset="100%" stop-color="#a07030"/>
                    </linearGradient>
                    <!-- 球头渐变 -->
                    <radialGradient id="hd" cx="35%" cy="32%">
                        <stop offset="0%"   stop-color="#9a5535"/>
                        <stop offset="55%"  stop-color="#7a3820"/>
                        <stop offset="100%" stop-color="#4a1808"/>
                    </radialGradient>
                </defs>
                <!-- 握柄（横向细棒，从球头右侧延伸到最右） -->
                <rect x="30" y="28" width="152" height="9" rx="4.5"
                      fill="url(#hg)" stroke="#906838" stroke-width=".5"/>
                <!-- 握柄高光 -->
                <rect x="35" y="29" width="140" height="3" rx="1.5"
                      fill="rgba(255,240,200,0.25)"/>
                <!-- 缠绳装饰（两条） -->
                <rect x="130" y="27" width="6" height="11" rx="1" fill="#c04020" opacity=".85"/>
                <rect x="140" y="27" width="6" height="11" rx="1" fill="#c04020" opacity=".85"/>
                <!-- 球头（击打端，在左侧） -->
                <circle cx="18" cy="32" r="18" fill="url(#hd)" stroke="#3a1008" stroke-width="1.2"/>
                <!-- 球头高光 -->
                <ellipse cx="12" cy="25" rx="7" ry="5" fill="rgba(255,210,180,0.28)"/>
            </svg>

            <!-- 木鱼：侧视圆润形，左侧开口，顶部圆珠，底部投影 -->
            <svg class="muyu-svg" id="muyuSvg" viewBox="0 0 220 220">
                <defs>
                    <!-- 主体径向渐变：左暗右亮（符合左侧开口、右侧实体的质感） -->
                    <radialGradient id="b1" cx="60%" cy="35%" r="72%">
                        <stop offset="0%"   stop-color="#c89050"/>
                        <stop offset="40%"  stop-color="#9a6030"/>
                        <stop offset="100%" stop-color="#5a3015"/>
                    </radialGradient>
                    <!-- 高光（右上） -->
                    <radialGradient id="hl" cx="65%" cy="28%" r="60%">
                        <stop offset="0%"   stop-color="rgba(255,238,200,0.38)"/>
                        <stop offset="100%" stop-color="rgba(255,238,200,0)"/>
                    </radialGradient>
                    <!-- 木纹（斜向细条纹） -->
                    <pattern id="wg" width="220" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(8)">
                        <line x1="0" y1="2.5" x2="220" y2="2.5"
                              stroke="rgba(50,20,5,0.07)" stroke-width="1.2"/>
                    </pattern>
                    <!-- 底部阴影遮罩 -->
                    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="rgba(0,0,0,0.22)"/>
                        <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
                    </radialGradient>
                </defs>

                <!-- 地面投影 -->
                <ellipse cx="115" cy="208" rx="72" ry="10" fill="rgba(0,0,0,0.18)"/>

                <!-- 木鱼主体（侧视略不对称：右侧稍饱满，左侧稍收窄，顶部有圆珠颈部） -->
                <path d="
                    M 110,28
                    Q 150,18 178,52
                    Q 205,82 205,118
                    Q 205,162 175,185
                    Q 148,202 112,202
                    Q 74,202 52,180
                    Q 32,158 32,120
                    Q 32,80  52,58
                    Q 70,36  110,28 Z"
                      fill="url(#b1)" stroke="#4a2810" stroke-width="2"/>
                <!-- 木纹叠加 -->
                <path d="
                    M 110,28 Q 150,18 178,52 Q 205,82 205,118
                    Q 205,162 175,185 Q 148,202 112,202
                    Q 74,202 52,180 Q 32,158 32,120
                    Q 32,80 52,58 Q 70,36 110,28 Z"
                      fill="url(#wg)"/>
                <!-- 高光 -->
                <path d="
                    M 110,28 Q 150,18 178,52 Q 205,82 205,118
                    Q 205,162 175,185 Q 148,202 112,202
                    Q 74,202 52,180 Q 32,158 32,120
                    Q 32,80 52,58 Q 70,36 110,28 Z"
                      fill="url(#hl)"/>

                <!-- ★ 左侧开口缝隙（木鱼最显著特征） -->
                <!-- 外层深色描边（凹陷感） -->
                <path d="M 42,90 Q 30,118 42,148"
                      fill="none" stroke="#200a02" stroke-width="11"
                      stroke-linecap="round"/>
                <!-- 内层深色（开口内壁） -->
                <path d="M 42,90 Q 30,118 42,148"
                      fill="none" stroke="#3a1508" stroke-width="7"
                      stroke-linecap="round"/>
                <!-- 内壁微亮（空腔反光） -->
                <path d="M 42,94 Q 32,118 42,144"
                      fill="none" stroke="rgba(120,60,20,0.4)" stroke-width="3"
                      stroke-linecap="round"/>

                <!-- 开口两端的加强凸起 -->
                <ellipse cx="45" cy="90"  rx="7" ry="5" fill="#5a2c10" transform="rotate(-30,45,90)"/>
                <ellipse cx="45" cy="148" rx="7" ry="5" fill="#5a2c10" transform="rotate(30,45,148)"/>

                <!-- 顶部短颈（圆珠与主体之间的衔接） -->
                <rect x="105" y="20" width="10" height="14" rx="5"
                      fill="#7a4520" stroke="#4a2810" stroke-width="1"/>
                <!-- 顶部小圆珠 -->
                <circle cx="110" cy="14" r="11" fill="#7a4520" stroke="#4a2810" stroke-width="1.5"/>
                <!-- 圆珠高光 -->
                <circle cx="106" cy="10" r="4" fill="rgba(255,230,200,0.32)"/>
            </svg>
        </div>

        <div class="stats">
            <div class="count" id="count">0</div>
            <div class="count-label">功德</div>
        </div>
        <div class="tips">
            🖐 敲木鱼 · 功德+1<br>
            👉 快速滑动 · 功德翻倍<br>
            📱 摇手机 · 佛光普照<br>
            <span style="font-size:11px;opacity:0.85;">✨ 功德超过666会更幸运 ✨</span>
        </div>
    </div>
    <div class="hint">📱 摇一摇 · 👆 滑一滑 · 🖐 敲一敲</div>

    <script>
        const muyuSvg=document.getElementById('muyuSvg'),hitZone=document.getElementById('hitZone'),
              mallet=document.getElementById('mallet'),countEl=document.getElementById('count'),
              particles=document.getElementById('particles');

        const KEY='muyu_gongde';
        const load=()=>{try{return parseInt(localStorage.getItem(KEY),10)||0}catch{return 0}};
        const save=()=>{try{localStorage.setItem(KEY,count)}catch{}};
        let count=load(); countEl.textContent=count;
        let isShaking=false;

        const blessings=[
            '🎫 抢票成功！','🙏 功德+1','✨ 好运降临','🌟 心想事成',
            '💫 票来票来','🎊 必中！','🔥 手速爆表','💪 势在必得',
            '🎁 幸运加持','⚡ 欧气满满','🚄 车票到手','🎯 一击必中',
            '☀️ 佛光护体','🏆 头等座！','🍀 四叶草加持'
        ];

        // ===== 木鱼音效 =====
        let actx;
        function wood(){
            try{
                if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
                const t=actx.currentTime,g=actx.createGain();
                g.gain.setValueAtTime(.35,t); g.gain.exponentialRampToValueAtTime(.001,t+.22);
                g.connect(actx.destination);
                [[180,80,'sine'],[350,120,'triangle']].forEach(([f1,f2,tp])=>{
                    const o=actx.createOscillator();o.type=tp;
                    o.frequency.setValueAtTime(f1,t);o.frequency.exponentialRampToValueAtTime(f2,t+.12);
                    o.connect(g);o.start(t);o.stop(t+.22);
                });
            }catch{}
        }

        // ===== 爆竹音效：连续噼啪声 =====
        function crackSound(){
            try{
                if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
                const pops=10;
                for(let i=0;i<pops;i++){
                    const delay=i*0.055+Math.random()*0.03;
                    const t=actx.currentTime+delay;
                    const g=actx.createGain();
                    g.gain.setValueAtTime(0,t);
                    g.gain.linearRampToValueAtTime(0.5+Math.random()*0.3,t+0.004);
                    g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
                    g.connect(actx.destination);
                    // 白噪声 buffer
                    const buf=actx.createBuffer(1,Math.ceil(actx.sampleRate*0.06),actx.sampleRate);
                    const d=buf.getChannelData(0);
                    for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
                    const src=actx.createBufferSource();
                    src.buffer=buf; src.connect(g); src.start(t);
                    // 高频共振增强爆裂感
                    const bq=actx.createBiquadFilter();
                    bq.type='bandpass'; bq.frequency.value=1200+Math.random()*800; bq.Q.value=0.8;
                    const g2=actx.createGain();
                    g2.gain.setValueAtTime(0,t);
                    g2.gain.linearRampToValueAtTime(0.2,t+0.002);
                    g2.gain.exponentialRampToValueAtTime(0.001,t+0.04);
                    const src2=actx.createBufferSource();
                    src2.buffer=buf; src2.connect(bq); bq.connect(g2); g2.connect(actx.destination); src2.start(t);
                }
            }catch{}
        }

        // ===== 飘字 =====
        function bless(x,y){
            const el=document.createElement('div'); el.className='bless';
            el.textContent=blessings[Math.random()*blessings.length|0];
            el.style.left=(x-50)+'px'; el.style.top=(y-30)+'px';
            document.body.appendChild(el); setTimeout(()=>el.remove(),1600);
        }

        // ===== 普通粒子 =====
        const pc=['#ff4040','#ffd700','#ff8c00','#fff','#ffb347','#ff6060','#ffe066'];
        function burst(x,y,n){
            for(let i=0;i<n;i++){
                const p=document.createElement('div');p.className='particle';
                const a=Math.random()*6.28,d=70+Math.random()*110,sz=3+Math.random()*5;
                p.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;`+
                    `background:${pc[Math.random()*pc.length|0]};`+
                    `--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d-50}px;`+
                    `animation-delay:${Math.random()*.12}s`;
                particles.appendChild(p); setTimeout(()=>p.remove(),2000);
            }
        }

        function ripple(){
            const r=document.createElement('div');r.className='ripple-ring';
            hitZone.appendChild(r); setTimeout(()=>r.remove(),700);
        }

        function anim(el,cls,ms){el.classList.remove(cls);void el.offsetWidth;el.classList.add(cls);setTimeout(()=>el.classList.remove(cls),ms);}

        // ===== 烟花爆炸粒子 =====
        function explodeFirework(x, y, color){
            // 爆炸中心闪
            const bf=document.createElement('div'); bf.className='fw-burst-flash';
            bf.style.cssText=`left:${x-40}px;top:${y-40}px;width:80px;height:80px;`+
                `background:radial-gradient(circle,${color} 0%,transparent 70%);`;
            document.body.appendChild(bf); setTimeout(()=>bf.remove(),400);
            // 爆炸粒子（球形散射）
            const n=60+Math.random()*20|0;
            for(let i=0;i<n;i++){
                const s=document.createElement('div'); s.className='fw-shell';
                const ang=(i/n)*Math.PI*2+Math.random()*.15;
                const dist=50+Math.random()*110;
                const dur=(0.55+Math.random()*.6).toFixed(2);
                const del=(Math.random()*.04).toFixed(3);
                s.style.cssText=
                    `left:${x}px;top:${y}px;`+
                    `background:${color};box-shadow:0 0 4px 1px ${color};`+
                    `--dx:${(Math.cos(ang)*dist).toFixed(1)}px;`+
                    `--dy:${(Math.sin(ang)*dist).toFixed(1)}px;`+
                    `--dur:${dur}s;--delay:${del}s;`;
                document.body.appendChild(s);
                setTimeout(()=>s.remove(),(+dur + +del + .15)*1000);
            }
        }

        // ===== 烟花火箭发射 =====
        const fwColors=['#ff0','#ff4400','#00ffcc','#ff00cc','#88ff00','#00aaff','#ffaa00','#ff2255'];
        function launchFirework(startX, launchDelay){
            setTimeout(()=>{
                const color=fwColors[Math.random()*fwColors.length|0];
                const startY=innerHeight+10;
                const endY=60+Math.random()*(innerHeight*.45);
                const flightMs=650+Math.random()*350|0;
                // 火箭
                const rocket=document.createElement('div'); rocket.className='fw-rocket';
                rocket.style.cssText=
                    `left:${startX-2}px;top:${startY}px;`+
                    `--color:${color};--ty:${endY-startY}px;--flight:${flightMs}ms;`;
                document.body.appendChild(rocket);
                setTimeout(()=>{ rocket.remove(); explodeFirework(startX,endY,color); },flightMs);
            },launchDelay);
        }

        // ===== 爆竹 + 烟花 + 爱你老婆特效 =====
        function firecrackerBoom(ox,oy){
            // 功德 +50
            count+=50; countEl.textContent=count; save();

            // 吉祥话数组
            const blessings=[
                '🎆 祝老婆大吉大利 🎆',
                '🎊 祝老婆新年快乐 🎊',
                '✨ 祝老婆天天开心 ✨',
                '🌟 祝老婆万事如意 🌟',
                '💫 祝老婆心想事成 💫',
                '💰 祝老婆财源滚滚 💰',
                '💪 祝老婆身体健康 💪',
                '🎯 祝老婆工作顺利 🎯',
                '🏠 祝老婆阖家幸福 🏠',
                '😊 祝老婆笑口常开 😊',
                '🕊️ 祝老婆平安喜乐 🕊️',
                '💕 祝老婆幸福美满 💕'
            ];
            const randomBlessing=blessings[Math.random()*blessings.length|0];

            crackSound();

            // 1. 爆炸局部闪光
            const flash=document.createElement('div');
            flash.className='crack-flash';
            flash.style.setProperty('--fx',(ox/innerWidth*100).toFixed(1)+'%');
            flash.style.setProperty('--fy',(oy/innerHeight*100).toFixed(1)+'%');
            document.body.appendChild(flash); setTimeout(()=>flash.remove(),450);

            // 2. 爆竹碎屑（红色纸条）
            const bits=['#ff0000','#cc0000','#ff3300','#ffd700','#fff','#ff4444','#ffee00'];
            for(let i=0;i<60;i++){
                const c=document.createElement('div'); c.className='cracker-bit';
                const ang=Math.random()*Math.PI*2, dist=80+Math.random()*180;
                const w=2+Math.random()*3.5, h=7+Math.random()*12;
                const delay=(Math.random()*.18).toFixed(3)+'s';
                const dur=(0.5+Math.random()*.85).toFixed(2)+'s';
                c.style.cssText=
                    `left:${ox}px;top:${oy}px;width:${w}px;height:${h}px;`+
                    `background:${bits[Math.random()*bits.length|0]};`+
                    `--dx:${(Math.cos(ang)*dist).toFixed(1)}px;`+
                    `--dy:${(Math.sin(ang)*dist).toFixed(1)}px;`+
                    `--rot:${(Math.random()*720-360).toFixed(0)}deg;`+
                    `--dur:${dur};--delay:${delay};`;
                document.body.appendChild(c); setTimeout(()=>c.remove(),1900);
            }

            // 3. 🎆 多发烟花（交错延时升空）
            const baseX=innerWidth*.5;
            const positions=[-160,-80,0,80,160];
            positions.forEach((offset,idx)=>{
                const jitter=(Math.random()-0.5)*60;
                launchFirework(baseX+offset+jitter, idx*180);
            });

            // 4. 礼花纸屑（彩色，随烟花飞散）
            const cfColors=['#ff0','#f00','#0f0','#0ff','#f0f','#fff','#ffa500','#ff69b4'];
            for(let i=0;i<30;i++){
                const cf=document.createElement('div'); cf.className='confetti';
                const ang=Math.random()*Math.PI*2, dist=100+Math.random()*220;
                const w=4+Math.random()*7, h=4+Math.random()*7, isRect=Math.random()>.5;
                const delay=(Math.random()*.25).toFixed(3)+'s';
                const dur=(0.8+Math.random()*1.1).toFixed(2)+'s';
                cf.style.cssText=
                    `--w:${w}px;--h:${h}px;--br:${isRect?'2px':'50%'};`+
                    `--color:${cfColors[Math.random()*cfColors.length|0]};`+
                    `--lx:${ox}px;--ty:${oy}px;`+
                    `--dx:${(Math.cos(ang)*dist).toFixed(1)}px;`+
                    `--dy:${(Math.sin(ang)*dist-90).toFixed(1)}px;`+
                    `--rot:${(Math.random()*540-270).toFixed(0)}deg;`+
                    `--dur:${dur};--delay:${delay};`;
                document.body.appendChild(cf); setTimeout(()=>cf.remove(),2400);
            }

            // 5. ✨ 顶部吉祥话吐司（非全屏）
            const toast=document.createElement('div'); toast.className='love-toast';
            toast.innerHTML=
                `<div class="love-toast-big">${randomBlessing}</div>`;
            document.body.appendChild(toast); setTimeout(()=>toast.remove(),3600);

            // 6. 星光雨（替换心形雨，更克制）
            const stardrop=['⭐','🌟','✨','🎊','🎇','🎆'];
            for(let i=0;i<10;i++){
                const h=document.createElement('div'); h.className='heart-drop';
                h.textContent=stardrop[Math.random()*stardrop.length|0];
                const sz=14+Math.random()*18;
                const delay=(Math.random()*1.2).toFixed(2)+'s';
                const dur=(1.5+Math.random()*1.6).toFixed(2)+'s';
                h.style.cssText=
                    `--sz:${sz}px;--lx:${(Math.random()*innerWidth).toFixed(0)}px;`+
                    `--dur:${dur};--delay:${delay};`+
                    `--rot:${(Math.random()*40-20).toFixed(0)}deg;`;
                document.body.appendChild(h); setTimeout(()=>h.remove(),4000);
            }

            // 7. 功德飘字
            const g=document.createElement('div'); g.className='bless';
            g.textContent='🧨 功德暴击 +50 ！';
            g.style.cssText=`left:${innerWidth/2-80}px;top:${innerHeight/2-60}px;`+
                `font-size:28px;color:#ffd700;`;
            document.body.appendChild(g); setTimeout(()=>g.remove(),1800);
        }

        // ===== 敲击主逻辑 =====
        function hit(x,y){
            count++;countEl.textContent=count;save();
            anim(mallet,'hitting',240); anim(muyuSvg,'hit',240);
            ripple();wood();
            
            // 功德超过666，每次敲击都触发烟花 🎆
            if(count>=666){
                firecrackerBoom(x||innerWidth/2, y||innerHeight/2);
            } else if(Math.random()<0.1){
                // 1/10 概率触发爆竹 🧨
                firecrackerBoom(x||innerWidth/2, y||innerHeight/2);
            } else {
                bless(x||innerWidth/2,y||innerHeight/2-50);
                burst(x||innerWidth/2,y||innerHeight/2,10);
            }
        }

        // 点击 / 触摸
        hitZone.addEventListener('click',e=>hit(e.clientX,e.clientY));
        hitZone.addEventListener('touchstart',e=>{e.preventDefault();muyuSvg.classList.add('active');},{passive:false});
        hitZone.addEventListener('touchend',e=>{e.preventDefault();muyuSvg.classList.remove('active');const t=e.changedTouches[0];hit(t.clientX,t.clientY);},{passive:false});

        // 滑动
        let sx=0,sy=0,st=0;
        document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();});
        document.addEventListener('touchend',e=>{
            if(!sx&&!sy)return;
            const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy,dt=Date.now()-st,dist=Math.hypot(dx,dy);
            if(dist>60&&dt<350){
                const b=Math.min((dist/40)|0,10);count+=b;countEl.textContent=count;save();wood();
                const cx=sx+dx/2,cy=sy+dy/2;
                const el=document.createElement('div');el.className='bless';
                el.textContent=`🌊 滑动功德 +${b}`;
                el.style.left=(cx-60)+'px';el.style.top=cy+'px';
                document.body.appendChild(el);setTimeout(()=>el.remove(),1600);
                burst(cx,cy,14);
            }
            sx=sy=0;
        });

        // 摇晃检测（需要 HTTPS 和权限）
        let la={x:0,y:0,z:0},lst=0;
        let motionPermissionGranted=false;

        // iOS 13+ 需要请求权限
        function requestMotionPermission(){
            if(typeof DeviceMotionEvent.requestPermission==='function'){
                DeviceMotionEvent.requestPermission()
                    .then(permissionState=>{
                        if(permissionState==='granted'){
                            motionPermissionGranted=true;
                            initMotionListener();
                        }else{
                            console.log('摇晃权限被拒绝');
                        }
                    })
                    .catch(console.error);
            }else{
                // 非 iOS 或旧版本，直接初始化
                initMotionListener();
            }
        }

        function initMotionListener(){
            if(!window.DeviceMotionEvent){
                console.log('设备不支持 DeviceMotionEvent');
                return;
            }

            window.addEventListener('devicemotion',e=>{
                const a=e.accelerationIncludingGravity;
                if(!a||!a.x&&!a.y&&!a.z)return; // 数据无效

                const now=Date.now();
                if(now-lst<150)return; // 防抖

                const d=Math.abs(a.x-la.x)+Math.abs(a.y-la.y)+Math.abs(a.z-la.z);
                if(d>12&&!isShaking){ // 降低阈值，更容易触发
                    isShaking=true;lst=now;
                    const b=Math.min((d/3.5)|0,15);
                    count+=b;countEl.textContent=count;save();
                    wood();anim(mallet,'hitting',400);anim(muyuSvg,'hit',400);
                    const el=document.createElement('div');el.className='bless';
                    el.textContent=`📱 摇晃功德 +${b}`;
                    el.style.cssText='left:50%;top:38%;transform:translateX(-50%);font-size:25px';
                    document.body.appendChild(el);setTimeout(()=>el.remove(),1600);
                    burst(innerWidth/2,innerHeight/2,20);ripple();
                    setTimeout(()=>isShaking=false,450);
                }
                la={x:a.x||0,y:a.y||0,z:a.z||0};
            },{passive:true});
        }

        // 尝试初始化（iOS 13+ 需要先请求权限）
        if(typeof DeviceMotionEvent.requestPermission==='function'){
            // iOS 13+，在用户交互后请求权限
            const requestBtn=document.createElement('button');
            requestBtn.textContent='📱 启用摇晃功能';
            requestBtn.className='debug-btn';
            requestBtn.style.cssText='bottom:90px;right:12px;font-size:11px;padding:6px 12px;';
            requestBtn.onclick=()=>{
                requestMotionPermission();
                requestBtn.remove();
            };
            document.body.appendChild(requestBtn);
        }else{
            // 非 iOS 或旧版本，直接初始化
            initMotionListener();
        }

        document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
    </script>
</body>
</html>
